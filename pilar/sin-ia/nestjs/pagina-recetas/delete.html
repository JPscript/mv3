<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Receta</title>
    <link rel="stylesheet" href="styles.css">
    <script src="code.js" defer></script>
</head>

     <header>
        <h1 id="cabecera">ELIMINAR RECETA</h1>
    </header>

    <main>
         <div id="contenedorEliminar">
             <form action="">
                <div class="campo">
                    <label for="nombre">Introduce el nombre de la receta que deseas eliminar:</label>
                    <input type="text" id="nombre" name="nombre" class="cajaTexto" placeholder="Nombre de tu receta">
                </div>
            </form>
             <form action="">
                <div class="campo">
                    <label for="id">Introduce el ID de la receta que deseas eliminar</label>
                    <input type="number" id="id" name="id" class="cajaTexto" placeholder="ID de tu receta">
                </div>
            </form>
             <button type="submit" class="botonEliminar">Eliminar receta</button>

        </div>
     </main>
    <footer>
        <p>Gestiona tus recetas de forma fácil y rápida.</p>

</html>
