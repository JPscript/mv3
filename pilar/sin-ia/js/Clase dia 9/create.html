<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear receta</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>

    <header>
        <h1 id="cabecera">CREA TU RECETA</h1>
    </header>

    <main>
        <div id="contenedorFormulario">
            <form action="">
                <div class="campo">
                    <label for="nombre">Nombre de la receta</label>
                    <input type="text" id="nombre" name="nombre" class="cajaTexto" placeholder="Nombre de tu receta">
                </div>
                <div class="campo">
                    <label for="descripcion">Descripción</label>
                    <input type="text" id="descripcion" name="descripcion" class="cajaTexto" placeholder="Breve descripción">
                </div>
                <div class="campo">
                    <label for="ingredientes">Ingredientes</label>
                    <input type="text" id="ingredientes" name="ingredientes" class="cajaTexto" placeholder="Lista de ingredientes">
                </div>
                <div class="campo">
                    <label for="tiempo">Tiempo en minutos</label>
                    <input type="number" id="tiempo" name="tiempo" class="cajaTexto" placeholder="Tiempo de preparación">
                </div>
                <div class="campo">
                    <label for="dificultad">Dificultad</label>
                    <select name="dificultad" id="dificultad">
                        <option value="facil">Fácil</option>
                        <option value="media">Media</option>
                        <option value="dificil">Difícil</option>
                    </select>
                </div>

                <button type="submit" class="botonEnviar">Guardar receta</button>
            </form>
        </div>
    </main>
    <footer>
        <p>¡Comparte tu receta y disfruta cocinando!</p>
    </footer>

</body>
</html>
