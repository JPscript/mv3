<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheet.css">
    
    <title>CRUD</title>
</head>

<body style="height: 100dvh;">
    <header class="layout">
        <a href="main.html" class="crud-a">CRUD</a>
    </header>
    <main class = "layout">
        <form action="" enctype="multipart/form-data" id="create-form">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Calamares" name="nombre" value="toma">
            <label for="descripcion">Descripción</label>
            <textarea name="descripcion" id="descripcion" cols="50" rows="5"
            placeholder="Cuéntame tu receta, me está dando mucha hambre... mmmm..."></textarea>
            <label for="ingredientes">Ingredientes</label>
            <textarea name="ingredientes" id="ingredientes" cols="50" rows="5"
            placeholder="¡Por favor, que piqué mucho!"></textarea>
            <label for="tiempo">Tiempo</label>
            <input type="number" id="tiempo" value="10" name="tiempo" min="1">
            <p>Dificultad</p></label>
            <input type="radio" id="facil" name="dificultad" value="facil">
            <label for="facil">Fácil</label><br>
            <input type="radio" id="media" name="dificultad" value="media">
            <label for="media">Media</label><br>
            <input type="radio" id="dificil" name="dificultad" value="dificil">
            <label for="dificil">Difícil</label>
            <label for="image">Imagen</label>
            <input type="file" id="image" name="image">
            <input type="submit">
        </form>
    </main>
    <footer></footer>
    <script src="create.js"></script>
</body>

</html>
