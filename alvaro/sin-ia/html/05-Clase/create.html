<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE</title>
</head>

<body>
    <header>
        <h1>Create Recipe</h1>
    </header>
    <main>

        <form action="">
            <label for="name">Name:</label><br>
            <input type="text" name="name" id="name"><br>
            <label for="description">Description:</label><br>
            <textarea name="description" id="description" style="resize: none;"></textarea><br>
            <label for="ingredients">Ingredients:</label><br>
            <input type="text" name="ingredients" id="ingredients"><br>
            <label for="time">Time (in minutes):</label><br>
            <input type="number" name="time" id="time" min="1"><br>
            <label for="difficulty">Difficulty:</label><br>

            <select name="difficulty" id="difficulty">
                <option value="" disabled selected>Select difficulty</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select><br>

            <label for="image">Select image:</label><br>
            <input type="file" name="image" id="image"><br>

            <button type="submit">Submit</button>
        </form>

        <a href="index.html">
            <button>Back</button>
        </a>
    </main>
</body>

</html>
