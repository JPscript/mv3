<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPDATE</title>
</head>

<body>
    <header>
        <h1>Update Recipe</h1>
    </header>

    <main>
        <form action="">
            <label for="id">ID of the recipe to update:</label><br>
            <input type="text" name="id" id="id"><br>
            <label for="name">New Name:</label><br>
            <input type="text" name="name" id="name"><br>
            <label for="description">New Description:</label><br>
            <input type="text" name="description" id="description"><br>
            <label for="ingredients">New Ingredients:</label><br>
            <input type="text" name="ingredients" id="ingredients"><br>
            <label for="time">New Time:</label><br>
            <input type="text" name="time" id="time"><br>
            <label for="difficulty">New Difficulty:</label><br>
            <input type="text" name="difficulty" id="difficulty"><br>
            <button type="submit">Submit</button>
        </form>

        <a href="index.html">
            <button>Back</button>
        </a>
    </main>
</body>

</html>
