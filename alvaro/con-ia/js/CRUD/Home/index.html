<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD de Recetas - Home</title>
    <link rel="stylesheet" href="../shared/css/styles.css" />
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>CRUD de Recetas</h1>
            <p>Home de operaciones C/R/U/D</p>
        </header>

        <section class="grid">
            <article class="card">
                <div class="card-body">
                    <h3>Create</h3>
                    <p>Crear una receta nueva con 2 POST.</p>
                    <div class="actions">
                        <a class="button-link" href="../Create/create.html">Ir a Create</a>
                    </div>
                </div>
            </article>

            <article class="card">
                <div class="card-body">
                    <h3>Read</h3>
                    <p>Listar recetas y navegar a detalle.</p>
                    <div class="actions">
                        <a class="button-link" href="../Read/read.html">Ir a Read</a>
                    </div>
                </div>
            </article>

            <article class="card">
                <div class="card-body">
                    <h3>Update</h3>
                    <p>Seleccionar receta y editar datos.</p>
                    <div class="actions">
                        <a class="button-link" href="../Update/update.html">Ir a Update</a>
                    </div>
                </div>
            </article>

            <article class="card">
                <div class="card-body">
                    <h3>Delete</h3>
                    <p>Borrar receta con confirmación previa.</p>
                    <div class="actions">
                        <a class="button-link danger" href="../Delete/delete.html">Ir a Delete</a>
                    </div>
                </div>
            </article>
        </section>
    </div>
</body>
</html>
