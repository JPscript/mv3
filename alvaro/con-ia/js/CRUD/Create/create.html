<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create receta</title>
  <link rel="stylesheet" href="../shared/css/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Create receta</h1>
      <p>Crea receta y sube imagen opcional.</p>
    </header>

    <nav class="nav">
      <a href="../Home/index.html">Home</a>
      <a href="../Read/read.html">Read</a>
      <a href="../Update/update.html">Update</a>
      <a href="../Delete/delete.html">Delete</a>
    </nav>

    <form id="createForm">
      <label for="nombre">Nombre *</label>
      <input id="nombre" name="nombre" type="text" required />

      <label for="descripcion">Descripción *</label>
      <textarea id="descripcion" name="descripcion" required></textarea>

      <label for="ingredientes">Ingredientes *</label>
      <textarea id="ingredientes" name="ingredientes" required></textarea>

      <label for="tiempo_min">Tiempo (minutos) *</label>
      <input id="tiempo_min" name="tiempo_min" type="number" min="1" step="1" required />

      <label for="dificultad">Dificultad *</label>
      <select id="dificultad" name="dificultad" required>
        <option value="">Selecciona dificultad</option>
        <option value="facil">Fácil</option>
        <option value="media">Media</option>
        <option value="dificil">Difícil</option>
      </select>

      <label for="image">Imagen (archivo opcional)</label>
      <input id="image" name="image" type="file" accept="image/*" />

      <div class="actions">
        <button type="submit">Crear receta</button>
        <button type="reset" class="secondary">Limpiar</button>
      </div>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script src="../shared/js/crud-core.js"></script>
  <script src="./create.js"></script>
</body>
</html>
