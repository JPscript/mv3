<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="stylesCreate.css">

</head>

<body>

    <header>
        <a href="index.html" id="cabecera">Recetas</a>
    </header>

    <main>
        <div id="contenedorForm">
            <form action="" method="POST" enctype="multipart/form-data" id="formulario">
                <label for="nombre">Nombre de la receta</label>
                <input type="text" id="nombre" name="nombre" class="cajaTexto" placeholder="Escribe un nombre guay">
                <label for="descripcion">Descripcion</label>
                <input type="text" id="descripcion" name="descripcion" class="cajaTexto" placeholder="Escribe pa que me entere">
                <label for="ingredientes">Ingredientes</label>
                <input type="text" id="ingredientes" name="ingredientes" class="cajaTexto" placeholder="Dime que necesito">
                <label for="tiempo">Tiempo en minutos</label>
                <input type="number" id="tiempo" name="tiempo" class="cajaTexto" placeholder="Dime cuanto tardo">
                <label for="dificultad">Dificultad</label>
                <select name="dificultad" id="dificultad">
                    <option value="facil">Facil</option>
                    <option value="media">Media</option>
                    <option value="dificil">Dificil</option>
                    <option value="imposible">Imposible</option>
                </select>
                <label for="imagen">Imagen</label>
                <input type="file" id="imagen" name="imagen" accept="image/*">
                <input type="submit" value="Crear" id="submit">
            </form>
        </div>

    </main>

    <footer>

    </footer>
    <script src="scriptCreate.js"></script>
</body>


</html>
