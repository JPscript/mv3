<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create</title>
</head>

<body>
    <header>
        <h1>Crea una receta</h1>
    </header>
    <p> Completa el formulario para crear la receta</p>
    <form id="formulario-create">
        <label for="nombre">Nombre:</label>

        <input type="text" id="nombre" name="nombre">

        <label for="descripcion">Descripcion</label>
        <input type="text" id="descripcion" name="descripcion"></input>

        <label for="ingredientes">Ingredientes</label>
        <input type="text" id="ingredientes" name="ingredientes"></input>

        <label for="tiempo">Tiempo (minutos)</label>
        <input type="number" id="tiempo" name="tiempo_min" min="1" step="1" required>

        <label for="dificultad">Dificultad:</label>
        <select id="dificultad" name="dificultad" required>
            <option value="facil">Fácil</option>
            <option value="media">Media</option>
            <option value="dificil">Difícil</option>
        </select>

        

        <button type="submit">Crear receta</button>
    </form>
    <script src="../../js/CLASE5/create.js"></script>
</body>


</html>
