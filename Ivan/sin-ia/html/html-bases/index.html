<!DOCTYPE html>
<html>
<!-- Tittle quiere decir el titulo que va a salir arriba, en la pestaña -->

<head>
    <title>Ivancho</title>
</head>
<!-- Cuerpo de la pagina -->

<body>

    <h1>Mi primera web</h1>
    <p>Socorro</p>
    <hr>
    <!-- Aqui pongo un texto que lleva una imagen enlazada -- "a" para poner un enlace -->
    <a href="https://c.tenor.com/kNotlDYF6FIAAAAd/tenor.gif">Haz click para ver una sorpresa</a>
    <p>aqui que pongo?</p>
    <!-- Aqui hago un apartado por puntos y añado un texto en negrita
     "ul" para crear el bloque
     "li" para poner cada punto -->
    <ul>
        <b>Lista de cosas que hacer esta semana</b>
        <li>Llorar</li>
        <li>Comer</li>
        <li>Gimnasio</li>
    </ul>
    <!-- aqui un texto con un enlace al final que lleva a mi github 
     "p" para poner texto
     "a" para poner un enlace -->
    <p>Si quieres ver mas sobre mi trabajo <a href="https://github.com/notevan404">visita mi github</a> </p>
    <!-- Con "img" puedes añadir imagenes a la pagina -->
    <img src="https://images.squarespace-cdn.com/content/v1/64889a0c3371a761535b7474/ea214cf9-4244-4be3-a103-087cd4d4c895/Ty_Powdered+Toast+Man.jpeg"
        alt="https://images.squarespace-cdn.com/content/v1/64889a0c3371a761535b7474/ea214cf9-4244-4be3-a103-087cd4d4c895/Ty_Powdered+Toast+Man.jpeg"
        width="204" height="242">
    <!-- br lo uso para hacer espaciados entre lineas -->
    <br>
    <hr>
    <!-- "b" es para poner el texto en negrita -->
    <b>Ivancho corporation - All rights reserved ©</b>

</body>

</html>
