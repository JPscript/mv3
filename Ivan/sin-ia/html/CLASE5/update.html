<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Receta</title>
    <link rel="stylesheet" href="../../css/CLASE5/update.css" />
</head>

<body>
    <h2>Actualizar Receta</h2>
    <form action="update.html" method="post">
        <label for="nombre">Nombre de la receta a actualizar:</label><br>
        <input type="text" id="nombre" name="nombre"><br><br>
        <label for="descripcion">Nueva descripción:</label><br>
        <textarea id="descripcion" name="descripcion" rows="4" cols="50"></textarea><br><br>
        <label for="ingredientes">Nuevos ingredientes:</label><br>
        <textarea id="ingredientes" name="ingredientes" rows="4" cols="50"></textarea><br><br>
        <label for="tiempo">Nuevo tiempo:</label><br>
        <input type="text" id="tiempo" name="tiempo"><br><br>
        <input type="submit" value="Actualizar Receta">
    </form>

</body>

</html>
